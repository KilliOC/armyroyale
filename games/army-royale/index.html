<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="screen-orientation" content="landscape">
  <title>Army Royale</title>
  <style>
    * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; touch-action: none; }
    #app { position: relative; width: 100%; height: 100%; }
    #canvas { display: block; width: 100%; height: 100%; background: #111; position: absolute; top: 0; left: 0; }

    /* Force landscape on portrait devices */
    @media screen and (orientation: portrait) {
      html, body { width: 100vh; height: 100vw; }
      #app {
        transform: rotate(90deg);
        transform-origin: top left;
        width: 100vh;
        height: 100vw;
        position: absolute;
        top: 0;
        left: 100vw;
        overflow: hidden;
      }
    }

    /* ═══ TOP BAR ═══ */
    .topbar {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: max(4px, env(safe-area-inset-top)) 8px 0;
      pointer-events: none; z-index: 20;
    }
    .wall-box {
      min-width: 90px; padding: 4px 8px 5px; border-radius: 12px;
      text-align: center; font-weight: 900; color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
      border: 2px solid rgba(255,255,255,0.15);
      box-shadow: 0 3px 12px rgba(0,0,0,0.4);
    }
    .wall-box.blue { background: linear-gradient(180deg, #3468d0, #2850a0); }
    .wall-box.red { background: linear-gradient(180deg, #d04040, #a03030); }
    .wall-top { display: flex; align-items: center; justify-content: center; gap: 6px; }
    .wall-crown { font-size: 12px; }
    .wall-label { font-size: 9px; letter-spacing: 1.2px; text-transform: uppercase; opacity: 0.7; }
    .wall-hp-num { font-size: 20px; font-weight: 1000; line-height: 1.1; }
    .wall-hp-bar { width: 100%; height: 6px; border-radius: 3px; background: rgba(0,0,0,0.4); margin-top: 2px; overflow: hidden; }
    .wall-hp-fill { height: 100%; border-radius: 3px; transition: width 0.25s; }
    .wall-box.blue .wall-hp-fill { background: linear-gradient(90deg, #50a0ff, #80c8ff); }
    .wall-box.red .wall-hp-fill { background: linear-gradient(90deg, #ff5050, #ff8888); }
    .timer-box {
      padding: 3px 12px 4px; border-radius: 14px;
      background: linear-gradient(180deg, #4a2810, #301808);
      border: 2.5px solid #b07030; color: #ffd890;
      text-align: center; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      box-shadow: 0 4px 16px rgba(0,0,0,0.35);
    }
    .timer-label { font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase; opacity: 0.8; }
    .timer-value { font-size: 26px; font-weight: 1000; line-height: 1; }

    /* ═══ STATUS ═══ */
    #status-text {
      position: absolute; top: 52px; left: 50%; transform: translateX(-50%);
      padding: 4px 14px; border-radius: 10px;
      background: rgba(35,20,8,0.8); color: #ffd8a0;
      font-size: 12px; font-weight: 800; text-transform: uppercase;
      z-index: 20; pointer-events: none; white-space: nowrap;
    }

    /* ═══ COUNTDOWN OVERLAY ═══ */
    #countdown-overlay {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      z-index: 50; pointer-events: none;
    }
    #countdown-text {
      font-size: 130px; font-weight: 1000; color: #fff;
      text-shadow: 0 6px 24px rgba(0,0,0,0.9), 0 0 80px rgba(255,200,50,0.5),
                   0 0 120px rgba(255,160,30,0.3);
      opacity: 0; transition: opacity 0.15s, transform 0.3s;
      transform: scale(0.5);
    }
    #countdown-text.visible { opacity: 1; transform: scale(1); }

    /* ═══ RESULT OVERLAY ═══ */
    #result-overlay {
      position: absolute; inset: 0; display: none; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      z-index: 60; background: rgba(0,0,0,0.85);
    }
    #result-overlay.show { display: flex; }
    #result-overlay.show ~ .bottom-bar { visibility: hidden; }
    body.result-active .topbar { visibility: hidden !important; }
    body.result-active #status-text { visibility: hidden !important; }
    #result-title {
      font-size: 44px; font-weight: 1000; color: #ffd860;
      text-shadow: 0 4px 16px rgba(0,0,0,0.8), 0 0 50px rgba(255,210,80,0.4),
                   0 0 100px rgba(255,180,40,0.2);
      text-transform: uppercase;
      animation: resultPulse 0.8s ease-in-out infinite alternate;
    }
    @keyframes resultPulse {
      from { transform: scale(1); }
      to { transform: scale(1.05); }
    }
    #result-stars { font-size: 52px; animation: starBounce 0.6s ease-in-out 0.3s; }
    @keyframes starBounce {
      0% { transform: scale(0); }
      60% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    #result-sub { font-size: 18px; color: #ffe0a0; font-weight: 800; }
    #result-chest {
      font-size: 64px; animation: chestBounce 0.5s ease-out 0.6s both;
    }
    @keyframes chestBounce {
      0% { transform: scale(0) rotate(-10deg); }
      70% { transform: scale(1.2) rotate(5deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    #rematch-btn {
      padding: 14px 40px; border-radius: 16px; border: 3px solid #ffd050;
      background: linear-gradient(180deg, #e08020, #b06010);
      color: #fff; font-size: 20px; font-weight: 1000; text-transform: uppercase;
      cursor: pointer; pointer-events: auto;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
      transition: transform 0.1s;
    }
    #rematch-btn:active { transform: scale(0.95); }

    /* ═══ DRAG GHOST ═══ */
    #drag-ghost {
      position: absolute; pointer-events: none; z-index: 30; display: none; opacity: 0.8;
    }
    .ghost-ring {
      width: 60px; height: 60px; border-radius: 50%; margin: 0 auto;
      border: 3px solid rgba(80,170,255,0.85);
      background: rgba(50,120,220,0.2);
      box-shadow: 0 0 24px rgba(80,170,255,0.5);
    }
    #drag-ghost.invalid .ghost-ring {
      border-color: rgba(255,70,70,0.85); background: rgba(220,50,50,0.2);
      box-shadow: 0 0 24px rgba(255,70,70,0.5);
    }
    .ghost-label {
      text-align: center; color: #fff; font-size: 11px; font-weight: 900;
      text-shadow: 0 1px 4px rgba(0,0,0,0.7); text-transform: uppercase; margin-top: 2px;
    }
    #deploy-line {
      position: absolute; top: 0; left: 50%; width: 0; height: 100%;
      pointer-events: none; z-index: 5; transition: all 0.3s;
    }
    #deploy-line.active { width: 2px; margin-left: -1px; background: rgba(80,170,255,0.3); }

    /* ═══ BOTTOM BAR ═══ */
    .bottom-bar {
      position: absolute; bottom: 0; left: 0; right: 0;
      display: flex; flex-direction: column; align-items: center;
      padding: 0 6px max(6px, env(safe-area-inset-bottom));
      pointer-events: none; z-index: 20; gap: 2px;
    }
    .card-row { display: flex; align-items: flex-end; gap: 5px; pointer-events: auto; }

    /* Elixir */
    .elixir-box {
      padding: 3px 8px; border-radius: 10px;
      background: linear-gradient(180deg, #6820a0, #401060);
      border: 2px solid rgba(255,255,255,0.15);
      color: #fff; font-weight: 1000; text-align: center;
      box-shadow: 0 3px 10px rgba(0,0,0,0.35);
      display: flex; align-items: baseline; gap: 1px; min-width: 48px; justify-content: center;
    }
    .elixir-num { font-size: 18px; line-height: 1; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }
    .elixir-sub { font-size: 11px; opacity: 0.5; }
    /* Segmented elixir bar — matches card tray width */
    .elixir-bar-seg {
      width: min(560px, 88vw); height: 10px; border-radius: 5px;
      background: rgba(0,0,0,0.55); overflow: hidden; pointer-events: none;
      border: 1.5px solid rgba(255,255,255,0.12);
      display: flex; gap: 1.5px; padding: 1.5px;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.4);
    }
    .elixir-seg {
      flex: 1; border-radius: 3px; transition: background 0.12s, box-shadow 0.12s;
      background: rgba(255,255,255,0.05);
    }
    .elixir-seg.filled {
      background: linear-gradient(180deg, #e840b0, #ff50c0);
      box-shadow: 0 0 6px rgba(255,80,180,0.4);
    }
    .elixir-seg.partial {
      background: linear-gradient(180deg, #a02878, #c03890);
      opacity: 0.6;
    }

    /* Card tray — ultra compact horizontal strip */
    .card-tray {
      display: flex; gap: 3px; padding: 3px 6px;
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(70,44,18,0.92), rgba(44,24,8,0.95));
      border: 2px solid #a07030;
      box-shadow: 0 3px 10px rgba(0,0,0,0.4);
    }
    .card {
      width: 58px; min-height: 52px; border-radius: 10px;
      border: 2px solid #7a5028;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 2px 2px 3px; cursor: grab; position: relative;
      box-shadow: 0 2px 0 rgba(50,25,8,0.6);
      transition: transform 0.1s, box-shadow 0.1s, opacity 0.15s;
    }
    .card.selected { transform: translateY(-4px); border-color: #ffd050;
      box-shadow: 0 5px 0 rgba(50,25,8,0.6), 0 0 12px rgba(255,210,60,0.3); }
    .card.dim { opacity: 0.3; pointer-events: none; }
    .card.dragging { opacity: 0.3; transform: scale(0.85); }
    .card[data-role="melee"] { background: linear-gradient(180deg, #b8d8ff, #6090d0); }
    .card[data-role="ranged"] { background: linear-gradient(180deg, #b8ffd8, #50b878); }
    .card[data-role="breaker"] { background: linear-gradient(180deg, #ffe0a8, #d09838); }
    .card[data-role="rush"] { background: linear-gradient(180deg, #ffc8e8, #c860a8); }
    .card-cost {
      position: absolute; top: -4px; left: -4px;
      width: 20px; height: 20px; border-radius: 10px;
      background: linear-gradient(180deg, #a840e0, #6018a0);
      border: 2px solid rgba(255,255,255,0.85);
      color: #fff; font-size: 11px; font-weight: 1000;
      display: grid; place-items: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
    .card-portrait { display: none; }
    .card-portrait canvas { display: none; }
    .card-name { font-size: 8px; font-weight: 900; text-transform: uppercase; color: rgba(0,0,0,0.75); letter-spacing: 0.3px; }
    .card-count { font-size: 7px; color: rgba(0,0,0,0.55); font-weight: 800; }
    .next-box {
      display: flex; flex-direction: column; align-items: center; gap: 1px;
      color: #c0a870; font-size: 7px; font-weight: 900; text-transform: uppercase;
    }
    .next-card-mini {
      width: 32px; height: 38px; border-radius: 8px;
      border: 2px solid #6a4820; display: grid; place-items: center;
      box-shadow: 0 2px 0 rgba(50,25,8,0.5); overflow: hidden;
    }
    .next-card-mini canvas { width: 100%; height: 100%; display: block; }
    .next-card-mini[data-role="melee"] { background: linear-gradient(180deg, #a0c8f0, #5080c0); }
    .next-card-mini[data-role="ranged"] { background: linear-gradient(180deg, #a0f0c0, #40a068); }
    .next-card-mini[data-role="breaker"] { background: linear-gradient(180deg, #f0d898, #c08828); }
    .next-card-mini[data-role="rush"] { background: linear-gradient(180deg, #f0b0d8, #b85098); }

    /* ═══ LOADING SCREEN ═══ */
    #loading-overlay {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px;
      background: linear-gradient(180deg, #1a1208 0%, #0d0906 100%);
      transition: opacity 0.5s;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }
    #loading-title {
      font-size: 42px; font-weight: 1000; color: #ffd860;
      text-shadow: 0 4px 16px rgba(0,0,0,0.8), 0 0 40px rgba(255,200,50,0.3);
      text-transform: uppercase; letter-spacing: 3px;
    }
    #loading-bar-outer {
      width: min(320px, 70vw); height: 18px; border-radius: 9px;
      background: rgba(255,255,255,0.08); border: 2px solid rgba(255,200,80,0.3);
      overflow: hidden;
    }
    #loading-bar-fill {
      width: 0%; height: 100%; border-radius: 7px;
      background: linear-gradient(90deg, #e08020, #ffd050);
      box-shadow: 0 0 12px rgba(255,180,40,0.5);
      transition: width 0.3s;
    }
    #loading-text {
      font-size: 14px; font-weight: 800; color: #c0a060;
      text-transform: uppercase; letter-spacing: 1px;
    }
    /* Hide game UI until loaded */
    .topbar, .bottom-bar, #status-text, #deploy-line, #drag-ghost { visibility: hidden; }
    body.game-ready .topbar, body.game-ready .bottom-bar, body.game-ready #status-text,
    body.game-ready #deploy-line, body.game-ready #drag-ghost { visibility: visible; }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="canvas"></canvas>

    <div class="topbar">
      <div class="wall-box blue">
        <div class="wall-top"><span class="wall-crown">👑</span><span class="wall-label">Wall HP</span></div>
        <div class="wall-hp-num" id="blue-hp">100</div>
        <div class="wall-hp-bar"><div class="wall-hp-fill" id="blue-hp-bar" style="width:100%"></div></div>
      </div>
      <div class="timer-box">
        <div class="timer-label" id="phase-label"></div>
        <div class="timer-value" id="match-timer">2:30</div>
      </div>
      <div class="wall-box red">
        <div class="wall-top"><span class="wall-label">Wall HP</span><span class="wall-crown">👑</span></div>
        <div class="wall-hp-num" id="red-hp">100</div>
        <div class="wall-hp-bar"><div class="wall-hp-fill" id="red-hp-bar" style="width:100%"></div></div>
      </div>
    </div>

    <div id="status-text">Loading...</div>
    <div id="countdown-overlay"><div id="countdown-text"></div></div>
    <div id="result-overlay">
      <div id="result-title"></div>
      <div id="result-stars"></div>
      <div id="result-chest"></div>
      <div id="result-sub"></div>
      <button id="rematch-btn">⚔️ REMATCH</button>
    </div>
    <div id="deploy-line"></div>
    <div id="drag-ghost"><div class="ghost-ring"></div><div class="ghost-label"></div></div>

    <div id="loading-overlay">
      <div id="loading-title">⚔️ Army Royale</div>
      <div id="loading-bar-outer"><div id="loading-bar-fill"></div></div>
      <div id="loading-text">Loading...</div>
    </div>

    <div class="bottom-bar">
      <div class="card-row">
        <div class="elixir-box">
          <div class="elixir-num" id="elixir-value">5</div>
          <div class="elixir-sub">/10</div>
        </div>
        <div class="card-tray" id="card-tray"></div>
        <div class="next-box">
          <span>Next</span>
          <div class="next-card-mini" id="next-card" data-role="melee"><canvas></canvas></div>
        </div>
      </div>
      <div class="elixir-bar-seg" id="elixir-bar-seg"></div>
    </div>
  </div>

  <script src="coi-serviceworker.js"></script>
  <script type="importmap">
    { "imports": { "@lfg/mini-engine": "../../node_modules/@lfg/mini-engine/dist/lfg-mini-engine.js" } }
  </script>
  <script>window.__LFG_ENGINE_BASE__ = "/runtime";</script>
  <script>
    // Try to lock orientation to landscape
    try { screen.orientation?.lock?.('landscape').catch(() => {}); } catch(e) {}
  </script>
  <script type="module" src="./main.js"></script>
</body>
</html>
